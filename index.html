<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="./dist/nextspace.js"></script>
</head>
<body>
    <script>
        // Setup global defaults.
        BModels.ENVIRONMENT.Reset({
            // Check "Overview" within the "This Account" sidebar section of Operator to see your Account ID.
            accountId: "openstreetmapdemo1",
            // UAT is for early access to features, for a stable release use PROD.
            env: BModels.Api.EEnv.UAT,
            sessionId: "anonymous"
        });

        // Get default api instance.
        // Normally you'd never have to do this.
        const api = BModels.ENVIRONMENT.Api().GetBruceApi();

        // Perform a test request to see if both the library and communication to the API are working.
        api.GET("test").then((res) => {
            console.log("You've loaded the library!", res);
        });
    </script>
</body>
</html>
